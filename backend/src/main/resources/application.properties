# Configuración de la aplicación
spring.application.name=billetera-digital
server.port=8080

# Configuración de base de datos H2 (desarrollo)
spring.datasource.url=jdbc:h2:mem:billeteradb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Configuración de MySQL (producción - comentar para desarrollo)
# spring.datasource.url=jdbc:mysql://localhost:3306/billeteradb
# spring.datasource.username=root
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# spring.jpa.hibernate.ddl-auto=update

# Configuración de logging
logging.level.com.fintech.billetera=DEBUG
logging.level.org.springframework.security=DEBUG

# Configuración de Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Configuración de CORS
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
